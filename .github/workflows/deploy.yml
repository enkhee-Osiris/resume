name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "enkherdene_bolormaa.org"
      - "enkherdene_bolormaa.sty"
      - "personal-info.org"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            emacs-nox \
            texlive-latex-extra \
            texlive-fonts-extra

      - name: Build PDF
        run: emacs --batch --eval '(setq org-confirm-babel-evaluate nil)' -l org enkherdene_bolormaa.org -f org-latex-export-to-pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
